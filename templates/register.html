<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - CryptoApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1629 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .card {
            background: rgba(15, 22, 41, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .input-group {
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: #1a2240;
            border: 1px solid #2d3a5e;
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 12px;
            color: #0a0e1a;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }
        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #64748b;
            font-size: 14px;
        }
        .login-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 500;
        }
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #2d3a5e;
            border-radius: 2px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }
        .strength-text {
            font-size: 11px;
            margin-top: 5px;
            color: #64748b;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-danger { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">🛡️</div>
                <h1>Créer un compte</h1>
                <p style="font-size: 12px; color: #475569; margin-top: 8px;">Rejoignez la plateforme de cryptographie</p>
            </div>

            {% for category, message in get_flashed_messages(with_categories=true) %}
            <div class="alert alert-{{ category }}">
                <i class="bi bi-exclamation-triangle me-2"></i>
                {{ message }}
            </div>
            {% endfor %}

            <form method="POST" action="/register" id="registerForm">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <div class="input-group">
                        <i class="bi bi-person"></i>
                        <input type="text" name="username" class="form-control" placeholder="Au moins 3 caractères" required minlength="3">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-group">
                        <i class="bi bi-envelope"></i>
                        <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="input-group">
                        <i class="bi bi-lock"></i>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Minimum 6 caractères" required>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <div class="input-group">
                        <i class="bi bi-lock-fill"></i>
                        <input type="password" name="confirm_password" id="confirm" class="form-control" placeholder="Répétez le mot de passe" required>
                    </div>
                </div>
                <button type="submit" class="btn-register">
                    <i class="bi bi-person-plus me-2"></i> Créer mon compte
                </button>
            </form>

            <div class="login-link">
                Déjà un compte ? <a href="/login">Se connecter</a>
            </div>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const val = this.value;
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { pct: '0%', color: 'transparent', label: '' },
                { pct: '25%', color: '#ef4444', label: 'Très faible' },
                { pct: '50%', color: '#f59e0b', label: 'Moyen' },
                { pct: '75%', color: '#3b82f6', label: 'Fort' },
                { pct: '100%', color: '#10b981', label: 'Très fort' }
            ];
            const level = levels[Math.min(score, 4)];
            strengthBar.style.width = level.pct;
            strengthBar.style.backgroundColor = level.color;
            strengthText.textContent = level.label;
            strengthText.style.color = level.color;
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            if (pwd !== confirm) {
                e.preventDefault();
                alert('Les mots de passe ne correspondent pas !');
            }
        });
    </script>
</body>
</html>
